baseURL = 'https://blog.saneax.in/'
title = 'Sanjay Upadhyay'
theme = "PaperMod"
languageCode = "en-us"
enableRobotsTXT = true

[params]
  env = "production"
  defaultTheme = "auto"
  description = "Engineering notes on networking, infrastructure, AI, and the occasional cultural commentary."
  author = "Sanjay Upadhyay"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowRssButtonInSectionTermList = true
  ShowCodeCopyButtons = true
  images = ["/images/logo.png"]
  mainSections = ["tech", "random-musings"]

[params.profileMode]
  enabled = false

[[menu.main]]
  name = "Blog"
  url  = "/"
  weight = 10
[[menu.main]]
  name = "Tech"
  url  = "/tech/"
  weight = 20
[[menu.main]]
  name = "Random Musings"
  url  = "/random-musings/"
  weight = 30
[[menu.main]]
  name = "About"
  url  = "/about/"
  weight = 40

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[minify]
  minifyOutput = true

[params.giscus]
  repo = "saneax/blog-saneax-source"
  repoId = "R_kgDOQMGQ5A"
  category = "General"
  categoryId = "DIC_kwDOQMGQ5M4CxQSI"
  mapping = "pathname"
  data-strict = "0"
  data-reactions-enabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "en"
  crossorigin = "anonymous"
